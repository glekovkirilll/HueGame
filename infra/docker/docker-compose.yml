services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: huegame
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d huegame"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend-init:
    image: huegame-app:local
    build:
      context: ../../
      dockerfile: infra/docker/app.Dockerfile
    working_dir: /workspace
    command: ["sh", "/workspace/infra/docker/backend-init.sh"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/huegame?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    image: huegame-app:local
    working_dir: /workspace
    command: ["sh", "/workspace/infra/docker/backend-start.sh"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/huegame?schema=public
      PORT: 3001
      ROUND_TICK_INTERVAL_MS: 1000
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      backend-init:
        condition: service_completed_successfully

  frontend:
    image: huegame-app:local
    working_dir: /workspace
    command: ["sh", "/workspace/infra/docker/frontend-start.sh"]
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres-data:
